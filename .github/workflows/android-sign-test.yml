name: Android Signing Test

# Manual-only: builds a release APK using the signing secrets and verifies it is
# signed with the real upload key (not debug). Use this to confirm the CI
# signing setup before cutting a release. Publishes nothing.
#   gh workflow run android-sign-test.yml
on:
  workflow_dispatch:

jobs:
  sign-test:
    name: Build + verify signed APK
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is empty."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Verify signature is the upload key (not debug)
        run: |
          APKSIGNER=$(ls "$ANDROID_SDK_ROOT"/build-tools/*/apksigner | sort -V | tail -1)
          APK=build/app/outputs/flutter-apk/app-release.apk
          echo "== package ID =="
          AAPT=$(ls "$ANDROID_SDK_ROOT"/build-tools/*/aapt | sort -V | tail -1)
          "$AAPT" dump badging "$APK" | grep -E "^package:"
          echo "== signer cert =="
          "$APKSIGNER" verify --print-certs "$APK" | tee /tmp/certs.txt
          if grep -q "CN=Android Debug" /tmp/certs.txt; then
            echo "::error::APK is DEBUG-signed — the signing secrets were not applied."
            exit 1
          fi
          echo "✅ APK is signed with the release (upload) key."
